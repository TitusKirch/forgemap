name: 🐛 Bug report
description: Something isn't working as expected
labels: ['bug', 'triage']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the form below.
        For security vulnerabilities, see [SECURITY.md](https://github.com/TitusKirch/forgemap/blob/main/SECURITY.md) instead.

  - type: input
    id: version
    attributes:
      label: forgemap version
      placeholder: e.g. 0.1.0
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: e.g. 24.3.0
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. macOS 15.1, Ubuntu 24.04, Windows 11 + WSL2
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear, concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Step-by-step instructions or a minimal failing command sequence.
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Logs, screenshots, related config, etc.
