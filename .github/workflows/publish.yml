# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Publish

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref to check out (commit, branch, or tag).
        type: string
        required: true
      dist-tag:
        description: npm dist-tag to publish under (latest, dev, dev-main, …).
        type: string
        required: true
      version:
        description: Optional prerelease version to write into package.json before publishing.
        type: string
        required: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish ${{ inputs.dist-tag }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.ref }}

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Override version (prereleases only)
        if: ${{ inputs.version != '' }}
        run: npm version --no-git-tag-version --allow-same-version "${{ inputs.version }}"

      - name: Publish
        run: pnpm publish --access public --provenance --no-git-checks --tag ${{ inputs.dist-tag }}
