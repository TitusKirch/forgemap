# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Publish Dev

on:
  push:
    branches:
      - main
      - dev

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compute:
    name: Compute prerelease version
    # Skip release-please's own version-bump merges on main.
    if: >-
      ${{
        github.ref_name == 'dev'
        || (
          !startsWith(github.event.head_commit.message, 'chore(main): release')
          && !startsWith(github.event.head_commit.message, 'chore: release')
        )
      }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - id: version
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            TAG=dev-main
          else
            TAG=dev
          fi
          BASE_VERSION=$(node -p "require('./package.json').version")
          BASE=${BASE_VERSION%%-*}
          SHORT_SHA=${GITHUB_SHA::7}
          NEW_VERSION="${BASE}-${TAG}.${{ github.run_number }}-${SHORT_SHA}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

  publish:
    name: Publish prerelease
    needs: compute
    uses: ./.github/workflows/publish.yml
    permissions:
      contents: read
      id-token: write
    with:
      ref: ${{ github.sha }}
      dist-tag: ${{ needs.compute.outputs.tag }}
      version: ${{ needs.compute.outputs.version }}
