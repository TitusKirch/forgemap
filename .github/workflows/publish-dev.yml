# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Publish Dev

on:
  push:
    branches:
      - main
      - dev

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-dev:
    name: Publish prerelease to npm
    # Skip release-please's own version-bump merges.
    if: >-
      ${{
        !startsWith(github.event.head_commit.message, 'chore(main): release')
        && !startsWith(github.event.head_commit.message, 'chore: release')
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Compute prerelease version
        id: version
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            TAG=dev-main
          else
            TAG=dev
          fi
          BASE_VERSION=$(node -p "require('./package.json').version")
          BASE=${BASE_VERSION%%-*}
          SHORT_SHA=${GITHUB_SHA::7}
          NEW_VERSION="${BASE}-${TAG}.${{ github.run_number }}-${SHORT_SHA}"
          npm version --no-git-tag-version --allow-same-version "$NEW_VERSION"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish
        run: pnpm publish --access public --provenance --no-git-checks --tag ${{ steps.version.outputs.tag }}
