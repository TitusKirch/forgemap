version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    # Open PRs against the dev branch (the integration branch), not main.
    target-branch: 'dev'
    schedule:
      interval: 'weekly'
    # Mirror the npm `minimumReleaseAge` (3 days): hold updates back until a
    # release has been public for a few days, dodging just-published malicious
    # or broken versions. Applies to every ecosystem below too.
    cooldown:
      default-days: 3
    labels:
      - 'dependencies'
      - 'stack: javascript'
    groups:
      # vitest and @vitest/* are version-locked siblings: @vitest/coverage-v8
      # imports internals from vitest itself, so a mismatched pair fails at
      # startup. They must move together on EVERY update type — a major is
      # outside npm-minor-patch below, which would split them into one PR per
      # package. Listed first so it wins the group match.
      vitest:
        patterns:
          - 'vitest'
          - '@vitest/*'
      npm-minor-patch:
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'

  - package-ecosystem: 'github-actions'
    directory: '/'
    target-branch: 'dev'
    schedule:
      interval: 'monthly'
    cooldown:
      default-days: 3
    labels:
      - 'dependencies'
      - 'stack: github-actions'
    groups:
      actions-minor-patch:
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'
